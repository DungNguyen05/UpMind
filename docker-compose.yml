services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cptutor
      POSTGRES_USER: cptutor
      POSTGRES_PASSWORD: cptutor_dev
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cptutor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  judge:
    build:
      context: .
      dockerfile: ./apps/judge/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://cptutor:cptutor_dev@postgres:5432/cptutor

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://cptutor:cptutor_dev@postgres:5432/cptutor
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev_secret_change_in_prod
      NEXTAUTH_URL: http://localhost:3000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-}

volumes:
  postgres_data:
